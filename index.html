<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SplitTrip</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1cc29f;
      --green-dark: #14a88a;
      --green-light: #e8faf6;
      --red: #e8685a;
      --red-light: #fdf1ef;
      --bg: #f0f0f0;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #888888;
      --border: #e0e0e0;
      --r: 16px;
      --r-sm: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --st: env(safe-area-inset-top);
      --sb: env(safe-area-inset-bottom);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: 520px;
      left: 50%;
      transform: translateX(-50%);
    }
    .screen.hidden { display: none; }

    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── HEADER ── */
    .hdr {
      background: var(--card);
      padding: calc(var(--st) + 12px) 16px 12px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; min-height: 56px;
    }
    .hdr.green { background: var(--green); border-bottom: none; }
    .hdr.green .hdr-title, .hdr.green .hdr-sub { color: #fff; }
    .hdr.green .icon-btn { color: #fff; }
    .hdr-title { font-size: 17px; font-weight: 700; flex: 1; }
    .hdr-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .icon-btn {
      width: 40px; height: 40px; border: none; background: none;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); font-size: 20px; flex-shrink: 0;
      transition: background .15s;
    }
    .icon-btn:active { background: rgba(0,0,0,.08); }

    /* ── BUTTONS ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 20px; border-radius: var(--r); border: none;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all .15s;
      min-height: 52px; width: 100%;
    }
    .btn:active { transform: scale(.98); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:active { background: var(--green-dark); }
    .btn-outline { background: #fff; color: var(--green); border: 2px solid var(--green); }
    .btn-ghost { background: #fff; color: var(--muted); border: 1px solid var(--border); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-sm { padding: 10px 16px; font-size: 14px; min-height: 40px; border-radius: var(--r-sm); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── AVATAR ── */
    .av {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .av-sm { width: 32px; height: 32px; font-size: 12px; }
    .av-md { width: 44px; height: 44px; font-size: 16px; }
    .av-lg { width: 56px; height: 56px; font-size: 20px; }

    /* ── HOME ── */
    .home-hero {
      background: var(--green);
      padding: calc(var(--st) + 20px) 20px 24px;
      color: #fff; flex-shrink: 0;
    }
    .home-hero h1 { font-size: 28px; font-weight: 800; }
    .home-hero p { font-size: 14px; opacity: .85; margin-top: 4px; }

    .fab {
      position: fixed; bottom: calc(var(--sb) + 20px); right: calc(50% - 240px + 20px);
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--green); color: #fff; border: none; font-size: 30px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(28,194,159,.45);
      cursor: pointer; z-index: 10; transition: transform .15s;
    }
    @media (max-width: 520px) { .fab { right: 20px; } }
    .fab:active { transform: scale(.92); }

    .group-row {
      padding: 16px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; border-bottom: 1px solid var(--border);
      background: var(--card); transition: background .15s;
    }
    .group-row:active { background: #f8f8f8; }
    .group-emoji {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--green-light); display: flex; align-items: center;
      justify-content: center; font-size: 26px; flex-shrink: 0;
    }
    .group-info { flex: 1; min-width: 0; }
    .group-name { font-size: 16px; font-weight: 700; }
    .group-meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .group-balance { font-size: 12px; font-weight: 700; text-align: right; flex-shrink: 0; line-height: 1.4; }
    .col-green { color: var(--green); }
    .col-red { color: var(--red); }
    .col-muted { color: var(--muted); }

    .empty {
      text-align: center; padding: 64px 32px;
    }
    .empty .icon { font-size: 64px; margin-bottom: 16px; }
    .empty h3 { font-size: 20px; font-weight: 700; }
    .empty p { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

    /* ── GROUP DETAIL ── */
    .group-hero {
      background: var(--green);
      padding: calc(var(--st) + 10px) 16px 16px;
      color: #fff; flex-shrink: 0;
    }
    .group-hero-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .group-hero-title { font-size: 19px; font-weight: 800; flex: 1; }

    .bubbles { display: flex; gap: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .bubbles::-webkit-scrollbar { display: none; }
    .bubble { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
    .bubble span { font-size: 11px; opacity: .85; white-space: nowrap; color: #fff; }

    .my-balance-banner {
      background: rgba(0,0,0,.15); border-radius: 10px;
      padding: 10px 14px; margin-top: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .my-balance-banner .label { font-size: 13px; opacity: .85; }
    .my-balance-banner .amount { font-size: 18px; font-weight: 800; }

    /* ── TABS ── */
    .tab-bar {
      display: flex; background: var(--card);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 14px 8px; text-align: center;
      font-size: 14px; font-weight: 600; color: var(--muted);
      cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s;
    }
    .tab.on { color: var(--green); border-bottom-color: var(--green); }
    .tab-pane { display: none; }
    .tab-pane.on { display: block; }

    /* ── EXPENSE LIST ── */
    .day-hdr {
      padding: 8px 16px; font-size: 12px; font-weight: 700;
      color: var(--muted); background: var(--bg);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .exp-row {
      padding: 13px 16px; display: flex; align-items: center; gap: 13px;
      border-bottom: 1px solid var(--border); background: var(--card);
    }
    .exp-row.archived { opacity: .58; }
    .exp-icon {
      width: 46px; height: 46px; border-radius: 12px; background: #f5f5f5;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .exp-info { flex: 1; min-width: 0; }
    .exp-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exp-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .exp-right { text-align: right; flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .exp-total { font-size: 15px; font-weight: 700; }
    .exp-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .del-btn {
      width: 32px; height: 32px; border: none; background: none;
      color: #ccc; font-size: 18px; cursor: pointer; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .del-btn:active { color: var(--red); background: var(--red-light); }
    .archive-btn:active { color: var(--green); background: var(--green-light); }

    /* ── BALANCES ── */
    .bal-row {
      padding: 14px 16px; display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border); background: var(--card);
    }
    .bal-info { flex: 1; }
    .bal-name { font-size: 15px; font-weight: 700; }
    .bal-detail { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .bal-amount { font-size: 18px; font-weight: 800; }

    /* ── SETTLE ── */
    .settle-row {
      padding: 16px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border); background: var(--card);
    }
    .settle-mid { flex: 1; text-align: center; }
    .settle-pays { font-size: 12px; color: var(--muted); }
    .settle-amount { font-size: 20px; font-weight: 800; color: var(--green); margin: 4px 0; }

    /* ── WIZARD ── */
    #sw { z-index: 100; }
    .wiz-hdr {
      background: var(--card); padding: calc(var(--st) + 12px) 16px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .wiz-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .wiz-title { font-size: 22px; font-weight: 800; flex: 1; }
    .wiz-sub { font-size: 14px; color: var(--muted); margin-top: 3px; }
    .progress { display: flex; gap: 4px; }
    .pdot { height: 4px; border-radius: 2px; background: var(--border); flex: 1; transition: background .3s; }
    .pdot.done { background: var(--green); }

    .wiz-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .wiz-foot {
      padding: 12px 16px calc(var(--sb) + 12px);
      background: var(--card); border-top: 1px solid var(--border); flex-shrink: 0;
    }

    /* step 1: categories */
    .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px; }
    .cat-tile {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 8px; border-radius: var(--r); background: var(--card);
      border: 2px solid var(--border); cursor: pointer; transition: all .15s;
    }
    .cat-tile:active, .cat-tile.sel { border-color: var(--green); background: var(--green-light); }
    .cat-icon { font-size: 30px; }
    .cat-name { font-size: 12px; font-weight: 700; text-align: center; color: var(--text); }

    /* step 2: description */
    .desc-body { padding: 20px 16px; }
    .field {
      width: 100%; border: 2px solid var(--border); border-radius: var(--r);
      padding: 16px; font-size: 18px; outline: none;
      transition: border-color .2s; background: var(--card);
      color: var(--text); font-family: inherit;
    }
    .field:focus { border-color: var(--green); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .chip {
      padding: 10px 14px; border-radius: 999px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 14px; cursor: pointer; transition: all .15s; color: var(--text);
    }
    .chip:active, .chip.sel { background: var(--green); border-color: var(--green); color: #fff; }

    /* step 3: amount */
    .amt-display { text-align: center; padding: 20px 16px 12px; }
    .ccy-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
    .ccy-chip {
      padding: 8px 14px; border-radius: 999px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; color: var(--text);
    }
    .ccy-chip.sel { background: var(--green); border-color: var(--green); color: #fff; }
    .amt-val {
      font-size: 52px; font-weight: 800; line-height: 1; color: var(--text); min-height: 64px;
    }
    .amt-val.dim { color: #ccc; }
    .amt-hint { font-size: 13px; color: var(--muted); margin-top: 6px; }

    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
    .nk {
      background: var(--card); padding: 0; height: 64px;
      text-align: center; font-size: 24px; font-weight: 600;
      cursor: pointer; border: none; color: var(--text);
      display: flex; align-items: center; justify-content: center; transition: background .1s;
    }
    .nk:active { background: #f0f0f0; }
    .nk.dim { background: #f8f8f8; color: var(--muted); cursor: default; }

    /* step 4: payer */
    .payer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
    .payer-tile {
      display: flex; align-items: center; gap: 12px; padding: 14px;
      border-radius: var(--r); background: var(--card);
      border: 2px solid var(--border); cursor: pointer; transition: all .15s;
    }
    .payer-tile:active, .payer-tile.sel { border-color: var(--green); background: var(--green-light); }
    .payer-name { font-size: 15px; font-weight: 700; }

    /* step 5: split */
    .split-body { padding: 16px; }
    .split-all-btn {
      width: 100%; padding: 16px; border-radius: var(--r);
      background: var(--green); color: #fff; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-bottom: 16px; transition: all .15s;
    }
    .split-all-btn:active { background: var(--green-dark); }
    .split-all-btn.off { background: var(--card); color: var(--green); border: 2px solid var(--green); }
    .split-member {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 0; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .split-member:last-child { border-bottom: none; }
    .chk {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s; font-size: 14px;
    }
    .chk.on { background: var(--green); border-color: var(--green); color: #fff; }
    .split-hint {
      margin-top: 14px; padding: 12px; background: var(--green-light);
      border-radius: var(--r-sm); font-size: 14px; color: var(--green-dark); text-align: center;
    }

    /* step 6: confirm */
    .confirm-body { padding-bottom: 16px; }
    .confirm-big {
      text-align: center; padding: 24px 16px 20px;
      border-bottom: 1px solid var(--border); background: var(--card);
    }
    .confirm-big .ca { font-size: 44px; font-weight: 800; color: var(--green); }
    .confirm-big .cb { font-size: 14px; color: var(--muted); margin-top: 6px; }
    .confirm-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      background: var(--card); cursor: pointer;
    }
    .confirm-row .cl { color: var(--muted); font-size: 13px; width: 72px; flex-shrink: 0; }
    .confirm-row .cv { font-size: 15px; font-weight: 600; flex: 1; }
    .confirm-row .ca-icon { font-size: 20px; flex-shrink: 0; color: var(--muted); }

    .breakdown {
      margin: 12px 16px; padding: 12px 14px;
      background: var(--green-light); border-radius: var(--r-sm);
    }
    .breakdown .bdr-title { font-size: 13px; font-weight: 700; color: var(--green-dark); margin-bottom: 8px; }
    .bdr-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
    .bdr-row .bdr-name { color: var(--text); }
    .bdr-row .bdr-amt { font-weight: 700; color: var(--green-dark); }

    /* ── CREATE GROUP ── */
    .cg-body { padding: 20px 16px; }
    .sec-label {
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px;
    }
    .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; }
    .em-opt {
      aspect-ratio: 1; border-radius: var(--r-sm);
      border: 2px solid var(--border); background: var(--card);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; cursor: pointer; transition: all .15s;
    }
    .em-opt.sel { border-color: var(--green); background: var(--green-light); }

    .add-member-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .add-member-row .field { flex: 1; padding: 14px; font-size: 16px; }
    .add-member-row .btn { flex-shrink: 0; width: auto; padding: 0 20px; min-height: 52px; border-radius: var(--r); }

    .mtag {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--card); border-radius: var(--r-sm);
      border: 1px solid var(--border); margin-bottom: 8px;
    }
    .mtag .mname { flex: 1; font-size: 15px; font-weight: 600; }
    .mtag .mrm {
      width: 28px; height: 28px; border: none; background: none;
      color: var(--muted); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; border-radius: 50%;
    }
    .mtag .mrm:active { background: #f0f0f0; color: var(--red); }

    .fx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .fx-item label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .fx-item .field { font-size: 16px; }

    .row-gap { display: flex; flex-wrap: wrap; gap: 8px; }

    /* ── SHARE SECTION ── */
    .share-sec {
      margin: 16px; padding: 16px; background: var(--card);
      border-radius: var(--r); border: 1px solid var(--border);
    }
    .share-sec .hint {
      font-size: 13px; color: var(--muted); text-align: center;
      line-height: 1.5; margin-bottom: 12px;
    }
    .share-btn-row { display: flex; gap: 10px; margin-bottom: 10px; }

    /* ── MISC ── */
    .mt8 { margin-top: 8px; }
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .sb-pad { height: calc(var(--sb) + 80px); }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a; --card: #2c2c2e; --text: #f0f0f0;
        --muted: #8e8e93; --border: #3a3a3c;
        --green-light: rgba(28,194,159,.15);
      }
      .nk, .cat-tile, .payer-tile, .chip, .ccy-chip, .mtag,
      .field, .share-sec, .em-opt { background: #2c2c2e; color: #f0f0f0; }
      .nk.dim { background: #1c1c1e; }
      .nk:active { background: #3a3a3c; }
      .numpad { background: #1a1a1a; }
      .confirm-row, .exp-row, .bal-row, .settle-row, .group-row,
      .wiz-hdr, .wiz-foot, .tab-bar, .hdr { background: #2c2c2e; }
      .exp-icon { background: #3a3a3c; }
      .cat-tile.sel, .payer-tile.sel { background: rgba(28,194,159,.2); }
      .confirm-big { background: #2c2c2e; }
      .split-hint { background: rgba(28,194,159,.15); }
    }
  </style>
</head>
<body>

<!-- ══════════════════ HOME ══════════════════ -->
<div id="sh" class="screen">
  <div class="home-hero">
    <h1>SplitTrip ✈️</h1>
    <p id="hello-user">Track group expenses, settle up easily</p>
  </div>
  <div class="scroll" style="padding-bottom:80px;">
    <div id="groups-list"></div>
  </div>
  <button class="fab" id="new-group-btn" title="New group">＋</button>
</div>

<!-- ══════════════════ CREATE / EDIT GROUP ══════════════════ -->
<div id="scg" class="screen hidden">
  <div class="hdr">
    <button class="icon-btn" id="cg-back">←</button>
    <div class="hdr-title" id="cg-title">New Group</div>
    <button class="icon-btn" id="cg-save" style="color:var(--green);font-size:15px;font-weight:800;width:auto;padding:0 8px;border-radius:8px;">Save</button>
  </div>
  <div class="scroll">
    <div class="cg-body">
      <div class="sec-label">Group Name</div>
      <input type="text" class="field" id="gname" placeholder="e.g. Guangzhou 2026" style="font-size:18px;">

      <div class="mt20"></div>
      <div class="sec-label">Icon</div>
      <div class="emoji-grid" id="emoji-grid"></div>

      <div class="mt20"></div>
      <div class="sec-label">Members</div>
      <div class="add-member-row">
        <input type="text" class="field" id="mname-input" placeholder="Enter name">
        <button class="btn btn-green btn-sm" id="add-mbr-btn">Add</button>
      </div>
      <div id="members-list"></div>

      <div class="mt20"></div>
      <div class="sec-label">Base Currency</div>
      <div class="row-gap" id="base-ccy-picker"></div>

      <div class="mt20"></div>
      <div class="sec-label">Exchange Rates → CNY</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">How many CNY equals 1 unit of each currency</div>
      <div class="fx-grid" id="fx-grid"></div>

      <div class="mt20"></div>
      <div class="sec-label">I am</div>
      <div class="row-gap" id="iam-picker"></div>

      <div class="sb-pad"></div>
    </div>
  </div>
</div>

<!-- ══════════════════ GROUP DETAIL ══════════════════ -->
<div id="sg" class="screen hidden">
  <div class="group-hero" id="ghero">
    <div class="group-hero-top">
      <button class="icon-btn" id="g-back" style="color:#fff;">←</button>
      <div style="flex:1;">
        <div class="group-hero-title" id="g-title"></div>
        <div style="font-size:12px;opacity:.8;margin-top:2px;" id="g-meta"></div>
      </div>
      <button class="icon-btn" id="g-edit" style="color:#fff;font-size:17px;">⚙</button>
    </div>
    <div class="bubbles" id="g-bubbles"></div>
    <div class="my-balance-banner" id="my-bal-banner" style="display:none;">
      <div class="label" id="my-bal-label"></div>
      <div class="amount" id="my-bal-amount"></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab on" data-tab="expenses">Expenses</div>
    <div class="tab" data-tab="balances">Balances</div>
    <div class="tab" data-tab="settle">Settle Up</div>
  </div>
  <div class="scroll" style="padding-bottom:80px;">
    <div class="tab-pane on" id="tp-expenses"></div>
    <div class="tab-pane" id="tp-balances"></div>
    <div class="tab-pane" id="tp-settle"></div>

</div>

<div id="sw" class="screen hidden">
  <div class="wiz-hdr">
    <div class="wiz-top">
      <button class="icon-btn" id="wiz-back">←</button>
      <div style="flex:1;">
        <div class="wiz-title" id="wiz-title">What did you pay for?</div>
        <div class="wiz-sub" id="wiz-sub">Pick a category</div>
      </div>
      <button class="icon-btn" id="wiz-close" style="font-size:16px;">✕</button>

    <div class="progress" id="wiz-prog"></div>
  </div>

    <button class="btn btn-green" id="wiz-next">Continue</button>
  </div>
</div>

<!-- hidden date input for confirm step -->
<input type="date" id="hidden-date" style="display:none;">

<script>
(() => {
  // ── CONSTANTS ──
  const CATS = [
    { n:'Food',       i:'🍜' },
    { n:'Drinks',     i:'🍺' },
    { n:'Didi/Taxi',  i:'🚖' },
    { n:'Metro',      i:'🚇' },
    { n:'Hotel',      i:'🏨' },
    { n:'Attractions',i:'🎭' },
    { n:'Shopping',   i:'🛍️' },
    { n:'Snacks',     i:'🧋' },
    { n:'Activities', i:'🎪' },
    { n:'Baoche',     i:'🚌' },
    { n:'Bookings',   i:'🎫' },
    { n:'General',    i:'📦' },
    { n:'Other',      i:'➕' },
  ];

  const EMOJIS = ['🇨🇳','🌏','✈️','🎒','🍜','🎉','🏖️','⛰️','🗺️','🏯','🌃','🎆','🍵','🥘','🚀','🎈'];
  const CCYS = ['CNY','SGD','USD','MYR','HKD'];
  const SYM = { CNY:'¥', SGD:'S$', USD:'$', MYR:'RM', HKD:'HK$' };

  const SUGGESTS = {
    Food:['Breakfast','Lunch','Dinner','Dim sum','Hot pot','Street food'],
    Drinks:['Bubble tea','Coffee','Beer','Cocktails'],
    'Didi/Taxi':['Didi to hotel','Didi to attraction','Taxi','Grab'],
    Metro:['MTR / Subway','Train fare'],
    Hotel:['Hotel stay','Accommodation'],
    Attractions:['Entrance fee','Tour','Museum'],
    Shopping:['Souvenirs','Clothes','Gifts'],
    Snacks:['Dessert','Ice cream','Pastry'],
    Activities:['Karaoke','Escape room','Spa','Bowling'],
    Baoche:['Chartered bus','Van rental'],
    Bookings:['Flight','Hotel booking','Tour booking'],
    General:['Miscellaneous','Tips','Toiletries'],
    Other:['Other expense'],
  };

  const AV_COLORS = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c','#e67e22','#34495e','#e91e63','#00bcd4','#ff5722','#607d8b'];

  // ── STATE ──
  let groups = [];
  let gid = null; // active group id
  let profile = { id:null, name:'' };

  let wiz = { step:1, data:{} };

  let cgState = {
    editId: null, emoji:'🌏', members:[],
    baseCcy:'CNY', fx:{ SGD:5.40, USD:7.25, MYR:1.60, HKD:0.93 }, iAm:null
  };

  // ── STORAGE ──
  function save() {
    try { localStorage.setItem('splittrip_v3', JSON.stringify(groups)); } catch(e){}
  }
  function load() {
    try {
      const r = localStorage.getItem('splittrip_v3');
      if (r) groups = JSON.parse(r);
    } catch(e) { groups = []; }
  }
  function saveProfile() {
    try { localStorage.setItem('splittrip_profile_v1', JSON.stringify(profile)); } catch(e){}
  }
  function loadProfile() {
    try {
      const r = localStorage.getItem('splittrip_profile_v1');
      if (r) profile = JSON.parse(r);
    } catch(e) { profile = { id:null, name:'' }; }
    profile.name = profile.name || '';
    if (!profile.id) {
      profile.id = uid();
      saveProfile();
    }
  }
  function ensureProfileName() {
    if (profile.name) return;
    const name = (prompt('What name should this device use?')||'').trim();
    if (name) {
      profile.name = name;
      saveProfile();
    }
  }
  function editProfileName() {
    const name = (prompt('Name for this device:', profile.name||'')||'').trim();
    if (!name) return;
    profile.name = name;
    saveProfile();
    renderHome();
  }

  // ── HELPERS ──
  function uid() {
    return (crypto.randomUUID?.()) || ('id-'+Date.now()+Math.random().toString(36).slice(2));
  }

  function avColor(name) {
    let h = 0;
    for (const c of name) h = (h*31 + c.charCodeAt(0)) & 0xfffffff;
    return AV_COLORS[h % AV_COLORS.length];
  }

  function avInit(name) {
    return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  }

  function av(name, cls='av-md') {
    const d = document.createElement('div');
    d.className = `av ${cls}`;
    d.style.background = avColor(name);
    d.textContent = avInit(name);
    return d;
  }

  function parseAmt(s) {
    if (!s || s==='.') return 0;
    const n = parseFloat(s);
    return isFinite(n) && n>0 ? Math.round(n*100) : 0;
  }

  function fmt(minor, ccy='CNY') {
    const sym = SYM[ccy] || ccy;
    const neg = minor < 0 ? '-' : '';
    const a = Math.abs(minor);
    return `${neg}${sym}${Math.floor(a/100)}.${String(a%100).padStart(2,'0')}`;
  }

  function toCny(minor, ccy, fx) {
    if (ccy === 'CNY') return minor;
    const rate = fx?.[ccy] || 1;
    return Math.round((minor/100)*rate*100);
  }

  function splitEvenly(total, members) {
    const n = members.length;
    if (!n) return {};
    const base = Math.floor(total/n);
    const rem  = total % n;
    const out  = {};
    members.forEach((m,i) => out[m] = base + (i < rem ? 1 : 0));
    return out;
  }

  function balances(group) {
    const net = {};
    (group.members||[]).forEach(m => net[m]=0);
    activeExpenses(group).forEach(e => {
      net[e.paidBy] = (net[e.paidBy]||0) + e.cnyFen;
      const shares = splitEvenly(e.cnyFen, e.splitAmong);
      e.splitAmong.forEach(m => { net[m] = (net[m]||0) - (shares[m]||0); });
    });
    return net;
  }
  function activeExpenses(group) {
    return (group.expenses||[]).filter(e => !e.archivedAt);
  }
  function archivedExpenses(group) {
    return (group.expenses||[]).filter(e => e.archivedAt);
  }

  function settlement(net) {
    const cr=[], dr=[];
    for (const [n,v] of Object.entries(net)) {
      if (v>0) cr.push([n,v]); else if (v<0) dr.push([n,-v]);
    }
    cr.sort((a,b)=>b[1]-a[1]); dr.sort((a,b)=>b[1]-a[1]);
    const txs=[]; let i=0,j=0;
    while (i<dr.length && j<cr.length) {
      const [dn,da]=dr[i]; const [cn,ca]=cr[j];
      const pay=Math.min(da,ca);
      if (pay>0) txs.push({from:dn,to:cn,amt:pay});
      dr[i][1]=da-pay; cr[j][1]=ca-pay;
      if (!dr[i][1]) i++; if (!cr[j][1]) j++;
    }
    return txs;
  }

  function today() { return new Date().toISOString().slice(0,10); }

  function fmtDate(iso) {
    if (!iso) return 'Today';
    const d = new Date(iso+'T00:00:00');
    const t = new Date(); t.setHours(0,0,0,0);
    const diff = Math.floor((d-t)/86400000);
    if (diff===0) return 'Today';
    if (diff===-1) return 'Yesterday';
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }

  // ── SCREEN ROUTER ──
  const SCREENS = { home:'sh', create:'scg', group:'sg', wizard:'sw' };
  function show(name) {
    Object.values(SCREENS).forEach(id => {
      const el = document.getElementById(id);
      el.classList.toggle('hidden', id !== SCREENS[name]);
    });
  }

  // ── HOME ──
  function renderHome() {
    const hello = document.getElementById('hello-user');
    if (hello) {
      hello.textContent = profile.name
        ? `Hello ${profile.name} · track group expenses, settle up easily`
        : 'Track group expenses, settle up easily';
      hello.title = 'Tap to change this device name';
      hello.style.cursor = 'pointer';
    }
    const list = document.getElementById('groups-list');
    if (!groups.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="icon">✈️</div>
          <h3>No trips yet</h3>
          <p>Create a group to start tracking<br>your trip expenses together.</p>
          <div class="mt20" style="display:flex;justify-content:center;">
            <button class="btn btn-green" id="first-group-btn" style="width:auto;padding:14px 32px;">Create a Group</button>
          </div>
        </div>`;
      document.getElementById('first-group-btn')?.addEventListener('click', ()=>openCreate());
    } else {
      list.innerHTML = '';
      groups.forEach(g => {
        const net = balances(g);
        const myNet = g.iAm ? (net[g.iAm]||0) : 0;
        const cls = myNet>0?'col-green':myNet<0?'col-red':'col-muted';
        const txt = myNet>0
          ? `You get back\n${fmt(myNet,'CNY')}`
          : myNet<0
          ? `You owe\n${fmt(-myNet,'CNY')}`
          : 'Settled up';

        const row = document.createElement('div');
        row.className = 'group-row';
        row.innerHTML = `
          <div class="group-emoji">${g.emoji||'✈️'}</div>
          <div class="group-info">
            <div class="group-name">${g.name}</div>
            <div class="group-meta">${g.members.length} people · ${activeExpenses(g).length} active · ${archivedExpenses(g).length} archived</div>
          </div>
          <div class="group-balance ${cls}">${txt.replace('\n','<br>')}</div>`;
        row.addEventListener('click', ()=>openGroup(g.id));
        list.appendChild(row);
      });

      // backup/import row
      const btns = document.createElement('div');
      btns.style.cssText='padding:16px;display:flex;gap:10px;';
      btns.innerHTML=`
        <button class="btn btn-ghost btn-sm" id="h-export" style="flex:1;font-size:13px;">📤 Export Backup</button>
        <button class="btn btn-ghost btn-sm" id="h-import" style="flex:1;font-size:13px;">📥 Import</button>
        <input type="file" id="h-import-file" accept="application/json" style="display:none;">`;
      list.appendChild(btns);
      document.getElementById('h-export').addEventListener('click', exportAll);
      document.getElementById('h-import').addEventListener('click', ()=>document.getElementById('h-import-file').click());
      document.getElementById('h-import-file').addEventListener('change', importAll);
    }
  }

  // ── CREATE GROUP ──
  function openCreate(editId=null) {
    const grp = editId ? groups.find(g=>g.id===editId) : null;
    if (grp) {
      cgState = {
        editId, emoji:grp.emoji||'🌏',
        members:[...(grp.members||[])],
        baseCcy:grp.baseCurrency||'CNY',
        fx:{...grp.fxRates},
        iAm:grp.iAm||null,
      };
      document.getElementById('cg-title').textContent='Edit Group';
      document.getElementById('gname').value=grp.name||'';
    } else {
      cgState = {
        editId:null, emoji:'🌏', members:[],
        baseCcy:'CNY', fx:{SGD:5.40,USD:7.25,MYR:1.60,HKD:0.93}, iAm:profile.name||null
      };
      document.getElementById('cg-title').textContent='New Group';
      document.getElementById('gname').value='';
    }
    renderCreate();
    show('create');
  }

  function renderCreate() {
    // emoji grid
    const eg = document.getElementById('emoji-grid');
    eg.innerHTML='';
    EMOJIS.forEach(e => {
      const b = document.createElement('button');
      b.className='em-opt'+(cgState.emoji===e?' sel':'');
      b.textContent=e;
      b.addEventListener('click', ()=>{ cgState.emoji=e; renderCreate(); });
      eg.appendChild(b);
    });

    renderMtags();

    // base currency
    const bcp = document.getElementById('base-ccy-picker');
    bcp.innerHTML='';
    CCYS.forEach(c=>{
      const b=document.createElement('button');
      b.className='chip'+(cgState.baseCcy===c?' sel':'');
      b.textContent=`${SYM[c]} ${c}`;
      b.addEventListener('click', ()=>{ cgState.baseCcy=c; renderCreate(); });
      bcp.appendChild(b);
    });

    // fx rates
    const fg = document.getElementById('fx-grid');
    fg.innerHTML='';
    CCYS.filter(c=>c!=='CNY').forEach(c=>{
      const item=document.createElement('div');
      item.className='fx-item';
      item.innerHTML=`<label>1 ${SYM[c]} ${c} =</label><input class="field" type="number" inputmode="decimal" step="0.01" placeholder="? CNY" value="${cgState.fx[c]||''}">`;
      item.querySelector('input').addEventListener('input', e=>{ cgState.fx[c]=parseFloat(e.target.value)||0; });
      fg.appendChild(item);
    });

    renderIam();
  }

  function renderMtags() {
    const list=document.getElementById('members-list');
    list.innerHTML='';
    cgState.members.forEach((name,idx)=>{
      const tag=document.createElement('div');
      tag.className='mtag';
      tag.appendChild(av(name,'av-sm'));
      const n=document.createElement('div'); n.className='mname'; n.textContent=name;
      const rm=document.createElement('button'); rm.className='mrm'; rm.textContent='×';
      rm.addEventListener('click', ()=>{
        cgState.members.splice(idx,1);
        if (cgState.iAm===name) cgState.iAm=cgState.members[0]||null;
        renderMtags(); renderIam();
      });
      tag.appendChild(n); tag.appendChild(rm);
      list.appendChild(tag);
    });
  }

  function renderIam() {
    const p=document.getElementById('iam-picker');
    p.innerHTML='';
    cgState.members.forEach(name=>{
      const b=document.createElement('button');
      b.className='chip'+(cgState.iAm===name?' sel':'');
      b.textContent=name;
      b.addEventListener('click', ()=>{ cgState.iAm=name; renderIam(); });
      p.appendChild(b);
    });
  }

  function doSaveGroup() {
    const name=document.getElementById('gname').value.trim();
    if (!name) { alert('Please enter a group name.'); return; }
    if (!cgState.members.length) { alert('Please add at least one member.'); return; }

    const obj = {
      id: cgState.editId||uid(),
      name, emoji:cgState.emoji,
      members:cgState.members,
      baseCurrency:cgState.baseCcy,
      fxRates:{...cgState.fx},
      iAm:cgState.members.includes(cgState.iAm) ? cgState.iAm : cgState.members[0],
      expenses:[],
      createdAt:new Date().toISOString(),
    };

    if (cgState.editId) {
      const idx=groups.findIndex(g=>g.id===cgState.editId);
      if (idx>=0) { obj.expenses=groups[idx].expenses; obj.createdAt=groups[idx].createdAt; groups[idx]=obj; }
    } else {
      groups.push(obj);
    }
    save();
    openGroup(obj.id);
  }

  // ── GROUP DETAIL ──
  function openGroup(id) {
    gid=id;
    const g=groups.find(x=>x.id===id);
    if (!g) return;
    renderGroup(g);
    show('group');
    setTab('expenses');
  }

  function getGroup() { return groups.find(x=>x.id===gid); }

  function renderGroup(g) {
    document.getElementById('g-title').textContent=`${g.emoji||''} ${g.name}`;
    document.getElementById('g-meta').textContent=`${g.members.length} members · ${activeExpenses(g).length} active · ${archivedExpenses(g).length} archived`;

    // bubbles
    const bb=document.getElementById('g-bubbles');
    bb.innerHTML='';
    g.members.forEach(name=>{
      const bub=document.createElement('div'); bub.className='bubble';
      const a=av(name,'av-sm'); a.style.border='2px solid rgba(255,255,255,.4)';
      const sp=document.createElement('span'); sp.textContent=name;
      bub.appendChild(a); bub.appendChild(sp); bb.appendChild(bub);
    });

    // my balance banner
    const net=balances(g);
    const me=g.iAm;
    const banner=document.getElementById('my-bal-banner');
    if (me && net[me]!==undefined) {
      const v=net[me];
      banner.style.display='flex';
      document.getElementById('my-bal-label').textContent=
        v>0?`${me} gets back`:(v<0?`${me} owes`:`${me} is settled`);
      document.getElementById('my-bal-amount').textContent=
        v===0?'🎉 All even':fmt(Math.abs(v),'CNY');
    } else {
      banner.style.display='none';
    }

    renderExpenses(g);
    renderBalances(g);
    renderSettle(g);
  }

  function setTab(name) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===name));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('on',p.id===`tp-${name}`));
  }

  function renderExpenses(g) {
    const c=document.getElementById('tp-expenses');
    const exps=activeExpenses(g);
    const archived=archivedExpenses(g);

    if (!exps.length && !archived.length) {
      c.innerHTML=`
        <div class="empty" style="padding:48px 24px;">
          <div class="icon">💳</div>
          <p style="font-size:15px;color:var(--muted);">No expenses yet.<br>Tap ＋ to add the first one!</p>
        </div>
        ${shareHTML(g)}`;
      bindShare(g);
      return;
    }

    // Group by date, newest first
    const byDate={};
    exps.forEach(e=>{ const d=e.date||today(); if(!byDate[d])byDate[d]=[]; byDate[d].push(e); });
    const sorted=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0]));

    c.innerHTML='';
    sorted.forEach(([date, list])=>{
      const dhdr=document.createElement('div');
      dhdr.className='day-hdr'; dhdr.textContent=fmtDate(date);
      c.appendChild(dhdr);

      list.forEach(e=>{
        const row=document.createElement('div');
        row.className='exp-row';
        const sym=SYM[e.currency]||'¥';
        const origStr=`${sym}${(e.originalAmount/100).toFixed(2)}`;
        const cnyStr=fmt(e.cnyFen,'CNY');
        const diff=e.currency!=='CNY';
        const n=e.splitAmong.length;
        const me=g.iAm;
        const myShare=me&&e.splitAmong.includes(me)
          ? splitEvenly(e.cnyFen,e.splitAmong)[me]||0
          : 0;
        const splitLabel=e.splitAmong.length===g.members.length?'Everyone':e.splitAmong.join(', ');

        row.innerHTML=`
          <div class="exp-icon">${e.categoryIcon||'📦'}</div>
          <div class="exp-info">
            <div class="exp-title">${e.description||e.category}</div>
            <div class="exp-meta">Paid by <strong>${e.paidBy}</strong> · ${splitLabel}</div>
          </div>
          <div class="exp-right">
            <div>
              <div class="exp-total">${diff?origStr:cnyStr}</div>
              <div class="exp-sub">${diff?cnyStr:(me&&myShare?fmt(myShare,'CNY')+' ea':'')}</div>
            </div>
            <button class="del-btn archive-btn" data-id="${e.id}" title="Archive as paid">✓</button>
            <button class="del-btn" data-id="${e.id}" title="Delete expense">🗑</button>
          </div>`;

        row.querySelector('.archive-btn').addEventListener('click', (ev)=>{
          ev.stopPropagation();
          const item=g.expenses.find(x=>x.id===e.id);
          if (!item) return;
          item.archivedAt=new Date().toISOString();
          save(); renderGroup(g); setTab('expenses');
        });

        row.querySelector('.del-btn:not(.archive-btn)').addEventListener('click', (ev)=>{
          ev.stopPropagation();
          if (confirm(`Delete "${e.description||e.category}"?`)) {
            g.expenses=g.expenses.filter(x=>x.id!==e.id);
            save(); renderGroup(g); setTab('expenses');
          }
        });
        c.appendChild(row);
      });
    });

    if (archived.length) {
      const dhdr=document.createElement('div');
      dhdr.className='day-hdr';
      dhdr.textContent='Archived paid expenses';
      c.appendChild(dhdr);

      archived
        .sort((a,b)=>(b.archivedAt||'').localeCompare(a.archivedAt||''))
        .forEach(e=>{
          const row=document.createElement('div');
          row.className='exp-row archived';
          const sym=SYM[e.currency]||'¥';
          const origStr=`${sym}${(e.originalAmount/100).toFixed(2)}`;
          const cnyStr=fmt(e.cnyFen,'CNY');
          const diff=e.currency!=='CNY';
          const splitLabel=e.splitAmong.length===g.members.length?'Everyone':e.splitAmong.join(', ');

          row.innerHTML=`
            <div class="exp-icon">${e.categoryIcon||'📦'}</div>
            <div class="exp-info">
              <div class="exp-title">${e.description||e.category}</div>
              <div class="exp-meta">Paid by <strong>${e.paidBy}</strong> · ${splitLabel} · archived</div>
            </div>
            <div class="exp-right">
              <div>
                <div class="exp-total">${diff?origStr:cnyStr}</div>
                <div class="exp-sub">${diff?cnyStr:''}</div>
              </div>
              <button class="del-btn archive-btn" data-id="${e.id}" title="Restore expense">↩</button>
              <button class="del-btn" data-id="${e.id}" title="Delete expense">🗑</button>
            </div>`;

          row.querySelector('.archive-btn').addEventListener('click', (ev)=>{
            ev.stopPropagation();
            const item=g.expenses.find(x=>x.id===e.id);
            if (!item) return;
            delete item.archivedAt;
            save(); renderGroup(g); setTab('expenses');
          });
          row.querySelector('.del-btn:not(.archive-btn)').addEventListener('click', (ev)=>{
            ev.stopPropagation();
            if (confirm(`Delete "${e.description||e.category}"?`)) {
              g.expenses=g.expenses.filter(x=>x.id!==e.id);
              save(); renderGroup(g); setTab('expenses');
            }
          });
          c.appendChild(row);
        });
    }

    const sd=document.createElement('div'); sd.innerHTML=shareHTML(g); c.appendChild(sd);
    bindShare(g);
  }

  function shareHTML(g) {
    return `
      <div class="share-sec">
        <div class="hint">
          💡 Each person opens this page on their phone, adds expenses, then taps <strong>Share Code</strong> to send a code via WhatsApp. The organiser imports all codes to see the full settlement.
        </div>
        <div class="share-btn-row">
          <button class="btn btn-ghost btn-sm js-share" style="flex:1;font-size:13px;">📤 Share Code</button>
          <button class="btn btn-ghost btn-sm js-import" style="flex:1;font-size:13px;">📥 Import Code</button>
        </div>
        <button class="btn btn-danger btn-sm js-del-group" style="font-size:13px;">🗑️ Delete Group</button>
      </div>`;
  }

  function bindShare(g) {
    document.querySelector('.js-share')?.addEventListener('click', ()=>doShare(g.id));
    document.querySelector('.js-import')?.addEventListener('click', ()=>doImport(g.id));
    document.querySelector('.js-del-group')?.addEventListener('click', ()=>{
      if (confirm(`Delete "${g.name}"? This cannot be undone.`)) {
        groups=groups.filter(x=>x.id!==g.id);
        save(); show('home'); renderHome();
      }
    });
  }

  function renderBalances(g) {
    const c=document.getElementById('tp-balances');
    const net=balances(g);
    if (!Object.keys(net).length||!activeExpenses(g).length) {
      c.innerHTML=`<div class="empty" style="padding:48px 24px;"><div class="icon">⚖️</div><p style="font-size:15px;color:var(--muted);">Add expenses to see who owes what.</p></div>`;
      return;
    }
    c.innerHTML='';
    Object.entries(net).sort((a,b)=>b[1]-a[1]).forEach(([name,v])=>{
      const row=document.createElement('div'); row.className='bal-row';
      const col=v>0?'var(--green)':v<0?'var(--red)':'var(--muted)';
      const label=v>0?'gets back':v<0?'owes':'is settled up';
      row.appendChild(av(name,'av-md'));
      row.innerHTML+=`
        <div class="bal-info">
          <div class="bal-name">${name}</div>
          <div class="bal-detail">${label}</div>
        </div>
        <div class="bal-amount" style="color:${col};">${v===0?'🎉':fmt(Math.abs(v),'CNY')}</div>`;
      c.appendChild(row);
    });
  }

  function renderSettle(g) {
    const c=document.getElementById('tp-settle');
    const net=balances(g);
    const txs=settlement(net);
    if (!txs.length) {
      const has=activeExpenses(g).length>0;
      c.innerHTML=`<div class="empty" style="padding:48px 24px;"><div class="icon">🎉</div><p style="font-size:15px;color:var(--muted);">${has?'All settled! No payments needed.':'Add expenses to see the settlement.'}</p></div>`;
      if (has) addArchiveSettledButton(c,g);
      return;
    }
    c.innerHTML=`<div class="day-hdr">Minimum payments to settle up</div>`;
    txs.forEach(tx=>{
      const row=document.createElement('div'); row.className='settle-row';
      const fromAv=av(tx.from,'av-md');
      const toAv=av(tx.to,'av-md');
      row.innerHTML=`
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          ${fromAv.outerHTML}
          <div style="font-size:11px;color:var(--muted);">${tx.from}</div>
        </div>
        <div class="settle-mid">
          <div class="settle-pays">pays</div>
          <div class="settle-amount">${fmt(tx.amt,'CNY')}</div>
          <div class="settle-pays">to</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          ${toAv.outerHTML}
          <div style="font-size:11px;color:var(--muted);">${tx.to}</div>
        </div>`;
      c.appendChild(row);
    });
    addArchiveSettledButton(c,g);
  }

  function addArchiveSettledButton(container,g) {
    if (!activeExpenses(g).length) return;
    const wrap=document.createElement('div');
    wrap.className='share-sec';
    wrap.innerHTML=`
      <div class="hint">After everyone has made the payments above, archive the active expenses. Archived expenses stay in history but no longer affect balances.</div>
      <button class="btn btn-green btn-sm js-archive-paid" style="font-size:13px;">Archive active expenses as paid</button>`;
    container.appendChild(wrap);
    wrap.querySelector('.js-archive-paid').addEventListener('click', ()=>{
      if (!confirm('Archive all active expenses as paid? This keeps them in history and clears them from balances.')) return;
      const now=new Date().toISOString();
      (g.expenses||[]).forEach(e=>{ if (!e.archivedAt) e.archivedAt=now; });
      save(); renderGroup(g); setTab('expenses');
    });
  }

  // ── WIZARD ──
  const STEPS=[
    { title:'What did you pay for?', sub:'Select a category' },
    { title:'What was it?',          sub:'Give it a name (optional)' },
    { title:'How much?',             sub:'Enter the total amount paid' },
    { title:'Who paid?',             sub:'Select the person who paid' },
    { title:'Who is sharing?',       sub:'Select everyone splitting this expense' },
    { title:'Review & Confirm',      sub:'Check details before saving' },
  ];

  function openWizard() {
    const g=getGroup();
    if (!g) return;
    wiz={
      step:1,
      data:{
        cat:null, catIcon:null,
        desc:'', amtStr:'',
        ccy:g.baseCurrency||'CNY',
        paidBy:g.iAm||g.members[0]||null,
        split:[...g.members],
        everyone:true,
        date:today(),
      }
    };
    renderWizStep();
    show('wizard');
  }

  function renderWizStep() {
    const s=wiz.step;
    const info=STEPS[s-1];
    document.getElementById('wiz-title').textContent=info.title;
    document.getElementById('wiz-sub').textContent=info.sub;

    // progress
    const prog=document.getElementById('wiz-prog');
    prog.innerHTML='';
    for(let i=1;i<=6;i++){
      const d=document.createElement('div');
      d.className='pdot'+(i<=s?' done':'');
      prog.appendChild(d);
    }

    document.getElementById('wiz-back').style.visibility=s>1?'visible':'hidden';
    const nb=document.getElementById('wiz-next');
    nb.textContent=s===6?'Add Expense ✓':'Continue';
    nb.disabled=false;

    const body=document.getElementById('wiz-body');
    body.scrollTop=0;
    switch(s){
      case 1: wizCat(body);   break;
      case 2: wizDesc(body);  break;
      case 3: wizAmt(body);   break;
      case 4: wizPayer(body); break;
      case 5: wizSplit(body); break;
      case 6: wizConfirm(body); break;
    }
  }

  function wizCat(body) {
    body.innerHTML='<div class="cat-grid" id="cat-grid"></div>';
    const grid=document.getElementById('cat-grid');
    CATS.forEach(cat=>{
      const tile=document.createElement('div');
      tile.className='cat-tile'+(wiz.data.cat===cat.n?' sel':'');
      tile.innerHTML=`<div class="cat-icon">${cat.i}</div><div class="cat-name">${cat.n}</div>`;
      tile.addEventListener('click', ()=>{
        wiz.data.cat=cat.n; wiz.data.catIcon=cat.i;
        setTimeout(()=>wizAdvance(),180);
        grid.querySelectorAll('.cat-tile').forEach(t=>t.classList.remove('sel'));
        tile.classList.add('sel');
      });
      grid.appendChild(tile);
    });
  }

  function wizDesc(body) {
    const sugg=SUGGESTS[wiz.data.cat]||['Expense'];
    body.innerHTML=`
      <div class="desc-body">
        <input type="text" class="field" id="desc-inp"
          placeholder="e.g. ${sugg[0]}"
          value="${wiz.data.desc}" maxlength="80"
          style="user-select:text;-webkit-user-select:text;">
        <div class="chips" id="desc-chips"></div>
        <div style="font-size:13px;color:var(--muted);margin-top:16px;">This field is optional — tap Continue to skip.</div>
      </div>`;
    const inp=document.getElementById('desc-inp');
    inp.addEventListener('input', ()=>{ wiz.data.desc=inp.value; });
    setTimeout(()=>inp.focus(),100);
    const chips=document.getElementById('desc-chips');
    sugg.forEach(s=>{
      const c=document.createElement('button'); c.className='chip'; c.textContent=s;
      c.addEventListener('click', ()=>{ wiz.data.desc=s; inp.value=s; });
      chips.appendChild(c);
    });
  }

  function wizAmt(body) {
    const sym=SYM[wiz.data.ccy]||'¥';
    const raw=wiz.data.amtStr;
    body.innerHTML=`
      <div class="amt-display">
        <div class="ccy-row" id="ccy-row"></div>
        <div class="amt-val${!raw?' dim':''}" id="amt-val">${sym}${raw||'0.00'}</div>
        <div class="amt-hint">Tap the numbers below to enter the amount</div>
      </div>
      <div class="numpad">
        <button class="nk" data-k="1">1</button>
        <button class="nk" data-k="2">2</button>
        <button class="nk" data-k="3">3</button>
        <button class="nk" data-k="4">4</button>
        <button class="nk" data-k="5">5</button>
        <button class="nk" data-k="6">6</button>
        <button class="nk" data-k="7">7</button>
        <button class="nk" data-k="8">8</button>
        <button class="nk" data-k="9">9</button>
        <button class="nk" data-k=".">.</button>
        <button class="nk" data-k="0">0</button>
        <button class="nk" data-k="⌫">⌫</button>
      </div>`;

    const ccyRow=document.getElementById('ccy-row');
    CCYS.forEach(c=>{
      const b=document.createElement('button');
      b.className='ccy-chip'+(wiz.data.ccy===c?' sel':'');
      b.textContent=`${SYM[c]} ${c}`;
      b.addEventListener('click', ()=>{ wiz.data.ccy=c; wizAmt(body); });
      ccyRow.appendChild(b);
    });

    body.querySelector('.numpad').addEventListener('click', ev=>{
      const k=ev.target.closest('[data-k]')?.dataset.k;
      if (!k) return;
      numKey(k);
      const disp=document.getElementById('amt-val');
      const sym2=SYM[wiz.data.ccy]||'¥';
      const s=wiz.data.amtStr;
      if(disp){ disp.textContent=`${sym2}${s||'0.00'}`; disp.className='amt-val'+(s?'':' dim'); }
    });
  }

  function numKey(k) {
    let s=wiz.data.amtStr;
    if (k==='⌫') { s=s.slice(0,-1); }
    else if (k==='.') { if(!s.includes('.')) s+='.'; }
    else {
      const dot=s.indexOf('.');
      if (dot>=0&&s.length-dot>2) return;
      if (s==='0') s=k; else s+=k;
      if (s.length>10) return;
    }
    wiz.data.amtStr=s;
  }

  function wizPayer(body) {
    const g=getGroup();
    if (!g) return;
    body.innerHTML='<div class="payer-grid" id="payer-grid"></div>';
    const grid=document.getElementById('payer-grid');
    g.members.forEach(name=>{
      const tile=document.createElement('div');
      tile.className='payer-tile'+(wiz.data.paidBy===name?' sel':'');
      tile.appendChild(av(name,'av-md'));
      const n=document.createElement('div'); n.className='payer-name'; n.textContent=name;
      tile.appendChild(n);
      tile.addEventListener('click', ()=>{
        wiz.data.paidBy=name;
        setTimeout(()=>wizAdvance(),180);
        grid.querySelectorAll('.payer-tile').forEach(t=>t.classList.remove('sel'));
        tile.classList.add('sel');
      });
      grid.appendChild(tile);
    });
  }

  function wizSplit(body) {
    const g=getGroup();
    if (!g) return;
    const minor=parseAmt(wiz.data.amtStr);
    const n=wiz.data.split.length;
    const perPerson=n>0?Math.round(minor/n):0;

    body.innerHTML=`
      <div class="split-body">
        <button class="split-all-btn${wiz.data.everyone?'':' off'}" id="sall-btn">
          ${wiz.data.everyone?'✓ ':''}Split equally with everyone
        </button>
        <div id="smembers"></div>
        <div class="split-hint" id="split-hint">
          ${n} ${n===1?'person':'people'} · ${SYM[wiz.data.ccy]||'¥'}${perPerson?((perPerson/100).toFixed(2)):'-'} each
        </div>
      </div>`;

    document.getElementById('sall-btn').addEventListener('click', ()=>{
      wiz.data.everyone=!wiz.data.everyone;
      if (wiz.data.everyone) wiz.data.split=[...g.members];
      wizSplit(body);
    });

    const mlist=document.getElementById('smembers');
    g.members.forEach(name=>{
      const row=document.createElement('div'); row.className='split-member';
      const checked=wiz.data.split.includes(name);
      row.appendChild(av(name,'av-sm'));
      const nm=document.createElement('div');
      nm.style.cssText='flex:1;font-size:15px;font-weight:600;';
      nm.textContent=name;
      const chk=document.createElement('div');
      chk.className='chk'+(checked?' on':'');
      chk.textContent=checked?'✓':'';
      row.appendChild(nm); row.appendChild(chk);
      row.addEventListener('click', ()=>{
        if (wiz.data.split.includes(name)) wiz.data.split=wiz.data.split.filter(m=>m!==name);
        else wiz.data.split.push(name);
        wiz.data.everyone=wiz.data.split.length===g.members.length;
        wizSplit(body);
      });
      mlist.appendChild(row);
    });
  }

  function wizConfirm(body) {
    const g=getGroup();
    const minor=parseAmt(wiz.data.amtStr);
    const cnyFen=toCny(minor,wiz.data.ccy,g?.fxRates);
    const sym=SYM[wiz.data.ccy]||'¥';
    const splitLabel=wiz.data.split.length===(g?.members.length||0)?'Everyone':wiz.data.split.join(', ');
    const shares=splitEvenly(cnyFen,wiz.data.split);

    const bdRows=wiz.data.split.map(name=>`
      <div class="bdr-row">
        <span class="bdr-name">${name}</span>
        <span class="bdr-amt">${fmt(shares[name]||0,'CNY')}</span>
      </div>`).join('');

    body.innerHTML=`
      <div class="confirm-body">
        <div class="confirm-big">
          <div class="ca">${sym}${wiz.data.amtStr||'0.00'}</div>
          ${wiz.data.ccy!=='CNY'?`<div style="font-size:14px;color:var(--muted);margin-top:6px;">≈ ${fmt(cnyFen,'CNY')}</div>`:''}
          <div class="cb">${wiz.data.catIcon||''} ${wiz.data.cat||'Expense'}</div>
        </div>
        <div class="confirm-row">
          <div class="cl">📝 What</div>
          <div class="cv">${wiz.data.desc||wiz.data.cat||'Expense'}</div>
        </div>
        <div class="confirm-row">
          <div class="cl">💳 Paid by</div>
          <div class="cv">${wiz.data.paidBy||'-'}</div>
        </div>
        <div class="confirm-row">
          <div class="cl">👥 Split</div>
          <div class="cv">${splitLabel}</div>
        </div>
        <div class="confirm-row" id="date-row" style="cursor:pointer;">
          <div class="cl">📅 Date</div>
          <div class="cv" id="date-display">${fmtDate(wiz.data.date)}</div>
          <div class="ca-icon">›</div>
        </div>
        <div class="breakdown">
          <div class="bdr-title">Per person breakdown (CNY)</div>
          ${bdRows}
        </div>
      </div>`;

    document.getElementById('date-row').addEventListener('click', ()=>{
      const hd=document.getElementById('hidden-date');
      hd.value=wiz.data.date;
      hd.onchange=()=>{
        if (hd.value) { wiz.data.date=hd.value; document.getElementById('date-display').textContent=fmtDate(hd.value); }
      };
      hd.showPicker?.();
      hd.click();
    });
  }

  function wizAdvance() {
    const s=wiz.step;
    if (s===1&&!wiz.data.cat) return;
    if (s===3) {
      if (!parseAmt(wiz.data.amtStr)) {
        const v=document.getElementById('amt-val');
        if(v){ v.style.color='var(--red)'; setTimeout(()=>v.style.color='',500); }
        return;
      }
    }
    if (s===4&&!wiz.data.paidBy) return;
    if (s===5&&!wiz.data.split.length) { alert('Select at least one person to split with.'); return; }
    if (s===6) { doAddExpense(); return; }
    wiz.step++;
    renderWizStep();
  }

  function doAddExpense() {
    const g=getGroup();
    if (!g) return;
    const minor=parseAmt(wiz.data.amtStr);
    if (!minor) return;
    const cnyFen=toCny(minor,wiz.data.ccy,g.fxRates);

    const exp={
      id:uid(),
      category:wiz.data.cat,
      categoryIcon:wiz.data.catIcon,
      description:wiz.data.desc||wiz.data.cat,
      originalAmount:minor,
      currency:wiz.data.ccy,
      cnyFen,
      paidBy:wiz.data.paidBy,
      splitAmong:[...wiz.data.split],
      date:wiz.data.date||today(),
      createdAt:new Date().toISOString(),
    };

    g.expenses.push(exp);
    save();
    show('group');
    renderGroup(g);
    setTab('expenses');
  }

  // ── EXPORT / IMPORT ──
  function doShare(groupId) {
    const g=groups.find(x=>x.id===groupId);
    if (!g) return;
    const code=btoa(unescape(encodeURIComponent(JSON.stringify({st:true,g}))));
    if (navigator.share) {
      navigator.share({title:g.name,text:`SplitTrip code for "${g.name}":\n\n${code}`}).catch(()=>{});
    } else {
      navigator.clipboard?.writeText(code)
        .then(()=>alert('✅ Share code copied!\n\nSend it to your group via WhatsApp. They can import it using "Import Code".'))
        .catch(()=>prompt('Copy this share code:',code));
    }
  }

  function doImport(targetId) {
    const code=(prompt('Paste the share code from a teammate:')||'').trim();
    if (!code) return;
    try {
      const p=JSON.parse(decodeURIComponent(escape(atob(code))));
      if (!p.st||!p.g) throw 1;
      const target=groups.find(x=>x.id===targetId);
      if (!target) return;
      const existing=new Set(target.expenses.map(e=>e.id));
      const added=(p.g.expenses||[]).filter(e=>!existing.has(e.id));
      target.expenses.push(...added);
      const exMbr=new Set(target.members);
      (p.g.members||[]).filter(m=>!exMbr.has(m)).forEach(m=>target.members.push(m));
      save();
      renderGroup(target);
      alert(`✅ Imported ${added.length} new expense${added.length!==1?'s':''}!`);
    } catch(e) { alert('Invalid code. Please try again.'); }
  }

  function exportAll() {
    const blob=new Blob([JSON.stringify({splittrip_backup:true,exportedAt:new Date().toISOString(),groups},null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`splittrip_backup_${today()}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  }

  function importAll(e) {
    const file=e.target.files?.[0]; if (!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try {
        const d=JSON.parse(ev.target.result);
        if (d.splittrip_backup&&Array.isArray(d.groups)) {
          const ids=new Set(groups.map(g=>g.id));
          d.groups.forEach(g=>{
            if (ids.has(g.id)) {
              const t=groups.find(x=>x.id===g.id);
              const ex=new Set(t.expenses.map(e=>e.id));
              t.expenses.push(...(g.expenses||[]).filter(e=>!ex.has(e.id)));
            } else { groups.push(g); }
          });
          save(); renderHome();
          alert('✅ Import successful!');
        }
      } catch(err) { alert('Invalid backup file.'); }
      e.target.value='';
    };
    reader.readAsText(file);
  }

  // ── BIND EVENTS ──
  function bind() {
    // Home
    document.getElementById('new-group-btn').addEventListener('click', ()=>openCreate());
    document.getElementById('hello-user').addEventListener('click', editProfileName);

    // Create group
    document.getElementById('cg-back').addEventListener('click', ()=>{ show('home'); renderHome(); });
    document.getElementById('cg-save').addEventListener('click', doSaveGroup);
    document.getElementById('add-mbr-btn').addEventListener('click', ()=>{
      const inp=document.getElementById('mname-input');
      const name=inp.value.trim();
      if (!name||cgState.members.includes(name)) { inp.value=''; return; }
      cgState.members.push(name);
      if (!cgState.iAm || name.toLowerCase()===profile.name.toLowerCase()) cgState.iAm=name;
      inp.value='';
      renderMtags(); renderIam();
    });
    document.getElementById('mname-input').addEventListener('keydown', e=>{
      if (e.key==='Enter') document.getElementById('add-mbr-btn').click();
    });

    // Group detail
    document.getElementById('g-back').addEventListener('click', ()=>{ show('home'); renderHome(); });
    document.getElementById('g-edit').addEventListener('click', ()=>openCreate(gid));
    document.getElementById('add-exp-btn').addEventListener('click', ()=>openWizard());
    document.querySelectorAll('.tab').forEach(t=>{
      t.addEventListener('click', ()=>setTab(t.dataset.tab));
    });

    // Wizard
    document.getElementById('wiz-next').addEventListener('click', wizAdvance);
    document.getElementById('wiz-back').addEventListener('click', ()=>{
      if (wiz.step<=1) { show('group'); return; }
      wiz.step--; renderWizStep();
    });
    document.getElementById('wiz-close').addEventListener('click', ()=>show('group'));
  }

  // ── INIT ──
  load();
  loadProfile();
  ensureProfileName();
  bind();
  renderHome();
  show('home');
})();
</script>
</body>
</html>
